name: Deploy to Namecheap (FTP)

on:
  push:
    branches: ["main", "dev", "qa"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set production API base URL
        run: |
          if [ -n "${{ vars.VITE_API_BASE }}" ]; then
            echo "VITE_API_BASE=${{ vars.VITE_API_BASE }}" >> $GITHUB_ENV
          else
            echo "VITE_API_BASE=https://xtipeal88c.execute-api.us-east-1.amazonaws.com" >> $GITHUB_ENV
          fi

      - name: Build production assets
        run: npm run build

      - name: Add SPA fallback for Apache hosting
        run: |
          cat > dist/.htaccess << 'EOF'
          RewriteEngine On
          RewriteBase /
          RewriteCond %{REQUEST_FILENAME} -f [OR]
          RewriteCond %{REQUEST_FILENAME} -d
          RewriteRule ^ - [L]
          RewriteRule . /index.html [L]
          EOF

      - name: Choose remote folder + clean mode
        id: target
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "REMOTE_DIR=/public_html/" >> $GITHUB_OUTPUT
            echo "CLEAN=false" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "dev" ]; then
            echo "REMOTE_DIR=/public_html/dev/" >> $GITHUB_OUTPUT
            echo "CLEAN=true" >> $GITHUB_OUTPUT
          else
            echo "REMOTE_DIR=/public_html/qa/" >> $GITHUB_OUTPUT
            echo "CLEAN=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          local-dir: ./dist/
          server-dir: ${{ steps.target.outputs.REMOTE_DIR }}
          dangerous-clean-slate: ${{ steps.target.outputs.CLEAN }}
